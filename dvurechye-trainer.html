<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Двуречье">
<meta name="theme-color" content="#0e1116">
<title>Сплин — Двуречье · тренажёр боя</title>
<style>
  :root{
    --bg:#0e1116; --panel:#171c24; --panel2:#1f2630;
    --line:#2a323d; --text:#e7edf5; --muted:#8b97a7;
    --accent:#ffb33a; --accent2:#3ad6ff; --on:#2bd47d;
    --down:#f2c83a; --up:#ef7d34; --rest:#39414d;
    --maxw:480px;   /* ширина колонки на широких экранах */
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    position:fixed; top:0; right:0; bottom:0; left:0;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    overflow:hidden; user-select:none; -webkit-user-select:none;
  }
  /* колонка фиксированной ширины по центру на широких экранах */
  header, .screen, .footer{width:100%; max-width:var(--maxw);}
  header{text-align:center; padding:12px 16px 4px;}
  header h1{margin:0; font-size:18px; font-weight:800; letter-spacing:.3px;}
  header p{margin:2px 0 0; font-size:11.5px; color:var(--muted); font-weight:600;}

  .screen{flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:6px 14px 20px;}
  .hidden{display:none !important;}

  .section-title{font-size:11.5px; color:var(--muted); font-weight:700; text-transform:uppercase;
    letter-spacing:.6px; margin:22px 4px 8px; display:flex; justify-content:space-between; align-items:center;}
  .section-title .hint{text-transform:none; letter-spacing:0; font-weight:600; opacity:.7;}

  /* ---- БОЙ editor ---- */
  .boi{background:var(--panel); border:1.5px solid var(--line); border-radius:13px;
    padding:10px 10px 12px; margin-bottom:9px;}
  .boi-head{display:flex; align-items:center; gap:8px; margin-bottom:9px;}
  .boi-name{font-size:14px; font-weight:800; color:var(--text);}
  .boi-head .spacer{flex:1;}
  .miniBtn{background:var(--panel2); border:1px solid var(--line); color:var(--muted);
    border-radius:9px; padding:6px 11px; font-size:12px; font-weight:700; cursor:pointer;}
  .miniBtn.play{color:var(--accent2); border-color:rgba(58,214,255,.35);}
  .cells{display:grid; grid-template-columns:repeat(8,1fr); gap:6px;}
  .cells.wide{grid-template-columns:repeat(16,1fr); gap:3px;}
  .cell{
    aspect-ratio:1/1; border-radius:50%; border:1.5px solid #0006;
    display:flex; align-items:center; justify-content:center;
    font-size:15px; font-weight:800; color:#1a1205; cursor:pointer;
    transition:transform .06s, box-shadow .06s, filter .06s;
    position:relative;
  }
  .cells.wide .cell{font-size:11px;}
  .cell.d{background:radial-gradient(circle at 38% 32%, #fff3b0, var(--down) 62%, #b8901f);}
  .cell.u{background:radial-gradient(circle at 38% 32%, #ffd0a0, var(--up) 60%, #b8531c); color:#2a1102;}
  .cell.r{background:radial-gradient(circle at 40% 35%, #4b5563, var(--rest) 70%, #232a33);
    color:#6b7686; box-shadow:inset 0 1px 3px #0007;}
  .cell.beatmark::after{content:""; position:absolute; bottom:-7px; left:50%; transform:translateX(-50%);
    width:3px; height:3px; border-radius:50%; background:var(--muted); opacity:.5;}
  .cell.live{transform:scale(1.18); box-shadow:0 0 16px 2px rgba(255,200,80,.55); z-index:2;}
  .cell.u.live{box-shadow:0 0 16px 2px rgba(239,125,52,.6);}
  .cell.r.live{box-shadow:0 0 12px 2px rgba(120,140,170,.4);}

  .legend{display:flex; gap:14px; justify-content:center; margin:2px 0 0; font-size:11.5px; color:var(--muted);}
  .legend span{display:inline-flex; align-items:center; gap:5px; font-weight:600;}
  .dot{width:13px; height:13px; border-radius:50%;}
  .dot.d{background:var(--down);} .dot.u{background:var(--up);} .dot.r{background:var(--rest); border:1px solid #4a5562;}

  /* ---- chords ---- */
  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{background:var(--panel); border:1.5px solid var(--line); color:var(--text);
    border-radius:12px; padding:8px 8px 5px; font-weight:700;
    display:flex; flex-direction:column; align-items:center; gap:3px; position:relative; width:84px;}
  .chip svg{width:62px; height:auto; display:block;}
  .chip .nm{font-size:15px; font-weight:800; letter-spacing:.3px;}
  .chip .noshape{font-size:10px; color:var(--muted); font-weight:600; height:78px; display:flex;
    align-items:center; text-align:center; padding:0 4px;}
  .chip .x{position:absolute; top:1px; right:6px; color:var(--muted); font-weight:800;
    font-size:17px; line-height:1; cursor:pointer; padding:2px;}
  .addchord{display:flex; gap:8px; margin-top:9px;}
  .addchord input{flex:1; background:var(--panel); border:1.5px solid var(--line); color:var(--text);
    border-radius:10px; padding:10px 12px; font-size:15px; font-weight:700; outline:none;}
  .addchord input:focus{border-color:var(--accent2);}
  .addchord button{background:var(--panel2); border:1.5px solid var(--line); color:var(--accent2);
    border-radius:10px; padding:0 16px; font-size:20px; font-weight:800; cursor:pointer;}

  /* ---- sequence ---- */
  .block{background:var(--panel); border:1.5px solid var(--line); border-radius:13px;
    padding:10px; margin-bottom:8px; display:flex; align-items:center; gap:9px;}
  .block .ord{font-size:12px; color:var(--muted); font-weight:800; width:18px; text-align:center;}
  .seg{display:flex; gap:4px;}
  .seg button{background:var(--panel2); border:1.5px solid var(--line); color:var(--muted);
    border-radius:8px; width:34px; height:38px; font-size:13px; font-weight:800; cursor:pointer;}
  .seg button.sel{background:rgba(255,179,58,.16); border-color:var(--accent); color:var(--accent);}
  .block select{background:var(--panel2); border:1.5px solid var(--line); color:var(--text);
    border-radius:9px; padding:9px 8px; font-size:15px; font-weight:700; min-width:64px; outline:none;
    -webkit-appearance:none; text-align:center;}
  .repbox{display:flex; align-items:center; gap:2px; margin-left:auto;}
  .repbox button{width:30px; height:34px; border-radius:8px; border:1px solid var(--line);
    background:var(--panel2); color:var(--text); font-size:17px; font-weight:800; cursor:pointer;}
  .repbox .n{min-width:30px; text-align:center; font-size:14px; font-weight:800; font-variant-numeric:tabular-nums;}
  .repbox .n small{display:block; font-size:8px; color:var(--muted); font-weight:700;}
  .block .del{background:none; border:none; color:#ff5466; font-size:19px; font-weight:800; cursor:pointer; padding:0 2px;}
  .addblock{width:100%; background:var(--panel2); border:1.5px dashed var(--line); color:var(--muted);
    border-radius:12px; padding:12px; font-size:14px; font-weight:700; cursor:pointer; margin-top:2px;}

  /* ---- options ---- */
  .opts{display:flex; gap:8px; margin-top:10px;}
  .opts button{flex:1; background:var(--panel2); border:1.5px solid var(--line); color:var(--muted);
    border-radius:10px; padding:11px 6px; font-size:12.5px; font-weight:700; cursor:pointer; line-height:1.2;}
  .opts button.on{background:rgba(43,212,125,.15); border-color:var(--on); color:var(--on);}

  /* ---- BPM ---- */
  .ctrl{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-top:8px;}
  .ctrl .label{display:flex; justify-content:center; align-items:center; margin-bottom:8px;}
  .bpmval{font-size:14px; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums;}
  .bpmval small{font-size:13px; color:var(--accent); font-weight:700; margin-left:3px;}
  input[type=range]{width:100%; -webkit-appearance:none; height:6px; border-radius:3px;
    background:linear-gradient(90deg,#3ad6ff,#ffe14d,#ff5466); margin:6px 0;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:26px; height:26px;
    border-radius:50%; background:#fff; box-shadow:0 2px 6px rgba(0,0,0,.5);}
  .stepper{display:flex; align-items:center; gap:10px; margin-top:8px;}
  .stepper button{width:46px; height:46px; border-radius:12px; border:1px solid var(--line);
    background:var(--panel2); color:var(--text); font-size:22px; font-weight:700; cursor:pointer;}
  .stepper .tap{flex:1; height:46px; font-size:13px; font-weight:700; color:var(--accent2);}

  /* ---- footer / start ---- */
  .footer{padding:10px 14px; border-top:1px solid var(--line); background:var(--bg);}
  .bigbtn{width:100%; padding:17px; border:none; border-radius:15px; font-size:18px; font-weight:800;
    color:#0e1116; background:var(--on); cursor:pointer; letter-spacing:.3px;}
  .bigbtn.stop{background:#ff5466; color:#fff;}
  .bigbtn:disabled{opacity:.4;}

  /* ---- PLAY screen ---- */
  #play{display:flex; flex-direction:column; align-items:center; justify-content:flex-start; text-align:center; padding-top:8px;}
  .phead{display:flex; align-items:center; justify-content:center; gap:20px; min-height:104px;}
  .pdiag{width:92px; display:flex; align-items:center;}
  .pdiag:empty{display:none;}
  .pdiag svg{width:92px; height:auto;}
  .pchord{font-size:60px; font-weight:800; letter-spacing:.5px; line-height:1; color:var(--text);}
  .pnext{font-size:13px; color:var(--muted); font-weight:700; margin-bottom:10px; min-height:16px;}
  .pnext b{color:var(--accent2);}
  .arrowbig{font-size:96px; line-height:1; height:108px; font-weight:800; transition:transform .05s, color .05s;}
  .arrowbig.d{color:var(--down);} .arrowbig.u{color:var(--up);} .arrowbig.r{color:var(--rest);}
  .arrowbig.pulse{transform:scale(1.14);}
  .pcells{width:100%; max-width:340px; margin:16px auto 6px;}
  .pcells.cells{grid-template-columns:repeat(8,1fr); gap:14px 8px;}   /* всегда 8 в ряд → 16 уходит на 2 ряда */
  .pcells .cell{font-size:24px; font-weight:300;}   /* стрелки в кружках тоньше */
  .beats{display:flex; gap:11px; justify-content:center; margin:6px 0 4px;}
  .beats i{width:11px; height:11px; border-radius:50%; background:var(--line);}
  .beats i.on{background:var(--accent); box-shadow:0 0 10px rgba(255,179,58,.7);}
  .pbpm{font-size:14px; color:var(--muted); font-weight:700; margin-top:8px;}
  .pblock{font-size:12px; color:var(--muted); margin-top:3px;}
  .flash{position:fixed; inset:0; background:var(--accent); opacity:0; pointer-events:none;}
</style>
</head>
<body>

<header>
  <h1>Двуречье · Сплин</h1>
  <p>Тренажёр боя — комбинируй бои и аккорды</p>
</header>

<!-- ===== SETUP ===== -->
<div class="screen" id="setup">

  <div class="section-title">Бои <span class="hint">тапни кружок: вниз → вверх → пропуск</span></div>
  <div id="bois"></div>
  <div class="legend">
    <span><i class="dot d"></i>удар вниз</span>
    <span><i class="dot u"></i>удар вверх</span>
    <span><i class="dot r"></i>не бьётся</span>
  </div>

  <div class="section-title">Аккорды</div>
  <div class="chips" id="chips"></div>
  <div class="addchord">
    <input id="chordInput" placeholder="например Em, C, G…" autocapitalize="off" autocomplete="off">
    <button id="chordAdd">+</button>
  </div>

  <div class="section-title">Последовательность <span class="hint">из чего собираем партию</span></div>
  <div id="blocks"></div>
  <button class="addblock" id="addBlock">＋ Добавить такт</button>

  <div class="opts">
    <button id="optMet">Метроном<br>выкл</button>
    <button id="optCount" class="on">Отсчёт<br>вкл</button>
    <button id="optLoop" class="on">Зациклить<br>вкл</button>
  </div>

  <div class="section-title">Темп</div>
  <div class="ctrl">
    <div class="label"><span class="bpmval"><span id="bpmNum">92</span><small>BPM</small></span></div>
    <input type="range" id="bpm" min="40" max="180" value="92">
    <div class="stepper">
      <button id="bpmMinus">–</button>
      <button class="tap" id="tap">Простучать темп</button>
      <button id="bpmPlus">+</button>
    </div>
  </div>
  <div style="height:8px"></div>
</div>

<!-- ===== PLAY ===== -->
<div class="screen hidden" id="play">
  <div class="phead">
    <div class="pchord" id="pchord">—</div>
    <div class="pdiag" id="pdiag"></div>
  </div>
  <div class="pnext" id="pnext"></div>
  <div class="arrowbig r" id="arrow">·</div>
  <div class="pcells cells wide" id="pcells"></div>
  <div class="beats" id="beats"></div>
  <div class="pbpm"><span id="pbpm">92</span> BPM</div>
  <div class="pblock" id="pblock"></div>
</div>

<div class="footer">
  <button class="bigbtn" id="start">▶ Старт</button>
</div>

<div class="flash" id="flash"></div>

<script>
"use strict";
const $ = id => document.getElementById(id);

/* ============ MODEL ============
   stroke token: 'D' вниз, 'U' вверх, '-' не бьётся (тишина)
   Каждый бой = 16 шестнадцатых (один такт 4/4 — два ряда по 8). Тапом редактируется.
   Значения по умолчанию — моё прочтение твоих 4 картинок. Проверь и поправь. */
/* длина боя индивидуальна: 16 ударов (шестнадцатые) или 8 (восьмые) — всё один такт 4/4 */
const SPB = 2;   // ударов в доле: каждый кружок = восьмая, скорость удара одинакова во всех боях
                 // → ряд из 8 = 1 такт 4/4, 16-ударный бой = 2 такта
const BOI1 = ['D','-','-','-','D','-','-','U', '-','U','D','-','D','U','D','U'];  // Бой 1 — 16
const BOI2 = ['D','U','D','-','D','-','-','U', '-','U','D','-','D','U','D','U'];  // Бой 2 — 16
const DEFAULT_BOIS = [
  BOI1.slice(),
  BOI2.slice(),
  ['D','U','D','-','D','-','D','U'],     // Бой 3 — 8
  ['D','U','D','-','D','U','D','U'],     // Бой 4 — 8
];
const DEFAULT_CHORDS = ['Em','Am','Dm','C','E','A','D','G'];
const CYCLE = { 'D':'U', 'U':'-', '-':'D' };
const ARROW = { 'D':'↓', 'U':'↑', '-':'·' };
const CLASS = { 'D':'d', 'U':'u', '-':'r' };

/* ============ аппликатуры аккордов ============
   струны читаются от 6-й (толстой, низкое Ми) к 1-й (тонкой):
   f  — лад на каждой струне: число, 0 = открытая, 'x' = заглушить
   fg — палец на этой струне (1 указ., 2 средн., 3 безым., 4 мизинец), 0 = нет */
const CHORD_SHAPES = {
  'Em': {f:[0,2,2,0,0,0],      fg:[0,2,3,0,0,0]},
  'Am': {f:['x',0,2,2,1,0],    fg:[0,0,2,3,1,0]},
  'Dm': {f:['x','x',0,2,3,1],  fg:[0,0,0,2,3,1]},
  'C':  {f:['x',3,2,0,1,0],    fg:[0,3,2,0,1,0]},
  'E':  {f:[0,2,2,1,0,0],      fg:[0,2,3,1,0,0]},
  'A':  {f:['x',0,2,2,2,0],    fg:[0,0,2,3,4,0]},
  'D':  {f:['x','x',0,2,3,2],  fg:[0,0,0,1,3,2]},
  'G':  {f:[3,2,0,0,0,3],      fg:[2,1,0,0,0,3]},
  'Bm': {f:['x',2,4,4,3,2],    fg:[0,1,3,4,2,1]},
  'F':  {f:[1,3,3,2,1,1],      fg:[1,3,4,2,1,1]},
  'G7': {f:[3,2,0,0,0,1],      fg:[3,2,0,0,0,1]},
  'C7': {f:['x',3,2,3,1,0],    fg:[0,3,2,4,1,0]},
  'D7': {f:['x','x',0,2,1,2],  fg:[0,0,0,2,1,3]},
  'E7': {f:[0,2,0,1,0,0],      fg:[0,2,0,1,0,0]},
  'A7': {f:['x',0,2,0,2,0],    fg:[0,0,2,0,3,0]},
  'B7': {f:['x',2,1,2,0,2],    fg:[0,2,1,3,0,4]},
  'Am7':{f:['x',0,2,0,1,0],    fg:[0,0,2,0,1,0]},
  'Em7':{f:[0,2,0,0,0,0],      fg:[0,2,0,0,0,0]},
  'Dm7':{f:['x','x',0,2,1,1],  fg:[0,0,0,2,1,1]},
  'Cadd9':{f:['x',3,2,0,3,3],  fg:[0,2,1,0,3,4]},
  'Gsus4':{f:[3,3,0,0,1,3],    fg:[2,3,0,0,1,4]},
};

/* строит SVG-диаграмму аккорда; '' если схемы нет */
function chordDiagram(name){
  const sh = CHORD_SHAPES[name]; if(!sh) return '';
  const frets = sh.f, fg = sh.fg || [0,0,0,0,0,0];
  const played = frets.filter(v => typeof v==='number' && v>0);
  const maxF = played.length ? Math.max.apply(null,played) : 0;
  const minF = played.length ? Math.min.apply(null,played) : 0;
  const startFret = maxF>4 ? minF : 1;
  const CELLS=4, nutY=22, fgap=19, bottomY=nutY+CELLS*fgap;
  const X = i => 14 + i*15.2;
  let s = '<svg viewBox="0 0 104 132" xmlns="http://www.w3.org/2000/svg">';
  for(let r=0;r<=CELLS;r++){
    const y=nutY+r*fgap, w=(r===0&&startFret===1)?3.5:1.3;
    s += `<line x1="14" y1="${y}" x2="90" y2="${y}" stroke="#8d99a8" stroke-width="${w}" stroke-linecap="round"/>`;
  }
  for(let i=0;i<6;i++) s += `<line x1="${X(i)}" y1="${nutY}" x2="${X(i)}" y2="${bottomY}" stroke="#8d99a8" stroke-width="1.3"/>`;
  if(startFret>1) s += `<text x="7" y="${nutY+fgap*0.62}" fill="#8d99a8" font-size="9" font-weight="700" text-anchor="middle">${startFret}</text>`;
  for(let i=0;i<6;i++){
    const v=frets[i];
    if(v==='x'){
      s += `<text x="${X(i)}" y="14" fill="#8d99a8" font-size="11" font-weight="800" text-anchor="middle">×</text>`;
    }else if(v===0){
      s += `<circle cx="${X(i)}" cy="10" r="3.4" fill="none" stroke="#8d99a8" stroke-width="1.3"/>`;
    }else{
      const cy=nutY+(v-startFret+0.5)*fgap;
      s += `<circle cx="${X(i)}" cy="${cy}" r="6.2" fill="#eef2f8"/>`;
      if(fg[i]) s += `<text x="${X(i)}" y="${cy+3.3}" fill="#10151c" font-size="9" font-weight="800" text-anchor="middle">${fg[i]}</text>`;
    }
  }
  return s + '</svg>';
}

/* ---- persisted state ---- */
const LS = 'dvurechye-trainer-v4';
let state = load();
function load(){
  try{
    const s = JSON.parse(localStorage.getItem(LS));
    if(s && s.bois){
      let dirty=false;
      if(!s.migReps1){ s.blocks.forEach(b=>b.reps=1); s.migReps1=true; dirty=true; }  // разово: повторы → 1
      if(!s.migRevertVideoBois){ s.bois[0]=BOI1.slice(); s.bois[1]=BOI2.slice(); s.migRevertVideoBois=true; dirty=true; }  // разово: откат боёв 1–2 к прежним
      if(!s.migAddDm){ if(!s.chords.includes('Dm')) s.chords.push('Dm'); s.migAddDm=true; dirty=true; }  // разово: добавить Dm
      if(dirty){ try{ localStorage.setItem(LS, JSON.stringify(s)); }catch(e){} }
      return s;
    }
  }catch(e){}
  return {
    bois: DEFAULT_BOIS.map(b=>b.slice()),
    chords: DEFAULT_CHORDS.slice(),
    blocks: [{boi:0, chord:'Em', reps:1}],
    bpm: 92, met:false, count:true, loop:true,
  };
}
function save(){ try{ localStorage.setItem(LS, JSON.stringify(state)); }catch(e){} }

/* ============ БОЙ editor ============ */
function renderBois(){
  const wrap = $('bois'); wrap.innerHTML='';
  state.bois.forEach((boi, bi)=>{
    const card = document.createElement('div'); card.className='boi';
    const head = document.createElement('div'); head.className='boi-head';
    head.innerHTML = `<span class="boi-name">Бой ${bi+1}</span><span class="spacer"></span>`;
    const audBtn = document.createElement('button'); audBtn.className='miniBtn play'; audBtn.textContent='▶ Прослушать';
    audBtn.onclick = ()=> auditionBoi(bi, audBtn);
    head.appendChild(audBtn);
    card.appendChild(head);

    const pb = SPB;
    const cells = document.createElement('div'); cells.className='cells wide'; cells.dataset.boi=bi;
    boi.forEach((tok, si)=>{
      const c = document.createElement('div');
      c.className = 'cell '+CLASS[tok]+(si%pb===0?' beatmark':'');
      c.textContent = ARROW[tok];
      c.dataset.boi=bi; c.dataset.si=si;
      c.onclick = ()=>{
        const t = CYCLE[state.bois[bi][si]];
        state.bois[bi][si] = t;
        c.className = 'cell '+CLASS[t]+(si%pb===0?' beatmark':'');
        c.textContent = ARROW[t];
        save(); refreshBlockBoiNames();
      };
      cells.appendChild(c);
    });
    card.appendChild(cells);
    wrap.appendChild(card);
  });
}

/* ============ Аккорды ============ */
function renderChips(){
  const wrap = $('chips'); wrap.innerHTML='';
  if(!state.chords.length){
    const e=document.createElement('div'); e.style.cssText='color:var(--muted);font-size:13px;font-weight:600;padding:4px';
    e.textContent='добавь аккорды ниже'; wrap.appendChild(e);
  }
  state.chords.forEach((ch, i)=>{
    const c = document.createElement('div'); c.className='chip';
    const diag = chordDiagram(ch);
    c.innerHTML = (diag || `<div class="noshape">нет схемы</div>`) +
      `<span class="nm">${ch}</span><span class="x">×</span>`;
    c.querySelector('.x').onclick = (e)=>{
      e.stopPropagation();
      state.chords.splice(i,1);
      // keep blocks valid
      state.blocks.forEach(b=>{ if(b.chord===ch) b.chord = state.chords[0]||''; });
      save(); renderChips(); renderBlocks();
    };
    wrap.appendChild(c);
  });
}
function addChord(){
  const inp = $('chordInput'); const v = inp.value.trim();
  if(v && !state.chords.includes(v)){ state.chords.push(v); save(); renderChips(); renderBlocks(); }
  inp.value=''; inp.focus();
}
$('chordAdd').onclick = addChord;
$('chordInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addChord(); });

/* ============ Sequence (blocks) ============ */
function renderBlocks(){
  const wrap = $('blocks'); wrap.innerHTML='';
  state.blocks.forEach((blk, i)=>{
    const row = document.createElement('div'); row.className='block';
    row.innerHTML = `<span class="ord">${i+1}</span>`;

    // бой selector
    const seg = document.createElement('div'); seg.className='seg';
    for(let b=0;b<4;b++){
      const btn=document.createElement('button'); btn.textContent='Б'+(b+1);
      if(blk.boi===b) btn.classList.add('sel');
      btn.onclick=()=>{ blk.boi=b; save(); renderBlocks(); };
      seg.appendChild(btn);
    }
    row.appendChild(seg);

    // chord select
    const sel = document.createElement('select');
    state.chords.forEach(ch=>{
      const o=document.createElement('option'); o.value=ch; o.textContent=ch;
      if(ch===blk.chord) o.selected=true; sel.appendChild(o);
    });
    if(!state.chords.length){ const o=document.createElement('option'); o.textContent='—'; sel.appendChild(o); }
    sel.onchange=()=>{ blk.chord=sel.value; save(); };
    row.appendChild(sel);

    // reps
    const rep=document.createElement('div'); rep.className='repbox';
    const minus=document.createElement('button'); minus.textContent='–';
    const n=document.createElement('div'); n.className='n'; n.innerHTML=`${blk.reps}<small>раз</small>`;
    const plus=document.createElement('button'); plus.textContent='+';
    minus.onclick=()=>{ blk.reps=Math.max(1,blk.reps-1); n.innerHTML=`${blk.reps}<small>раз</small>`; save(); };
    plus.onclick=()=>{ blk.reps=Math.min(32,blk.reps+1); n.innerHTML=`${blk.reps}<small>раз</small>`; save(); };
    rep.append(minus,n,plus); row.appendChild(rep);

    // delete
    const del=document.createElement('button'); del.className='del'; del.textContent='×';
    del.onclick=()=>{ state.blocks.splice(i,1); save(); renderBlocks(); updateStart(); };
    row.appendChild(del);

    wrap.appendChild(row);
  });
}
function refreshBlockBoiNames(){ /* бой content changed; nothing textual to update in blocks */ }
$('addBlock').onclick=()=>{
  const last = state.blocks[state.blocks.length-1];
  state.blocks.push({ boi: last?last.boi:0, chord: (last&&last.chord)||state.chords[0]||'', reps:1 });
  save(); renderBlocks(); updateStart();
};

/* ============ options ============ */
function syncOptBtn(id, on, label){
  const b=$(id); b.classList.toggle('on', on);
  b.innerHTML = label+'<br>'+(on?'вкл':'выкл');
}
$('optMet').onclick=()=>{ state.met=!state.met; save(); syncOptBtn('optMet',state.met,'Метроном'); };
$('optCount').onclick=()=>{ state.count=!state.count; save(); syncOptBtn('optCount',state.count,'Отсчёт'); };
$('optLoop').onclick=()=>{ state.loop=!state.loop; save(); syncOptBtn('optLoop',state.loop,'Зациклить'); };

/* ============ BPM ============ */
function setBpm(v){
  state.bpm=Math.max(40,Math.min(180,Math.round(v)));
  $('bpm').value=state.bpm; $('bpmNum').textContent=state.bpm; $('pbpm').textContent=state.bpm; save();
}
$('bpm').oninput=e=>setBpm(+e.target.value);
$('bpmMinus').onclick=()=>setBpm(state.bpm-1);
$('bpmPlus').onclick=()=>setBpm(state.bpm+1);
let taps=[];
$('tap').onclick=()=>{
  const t=performance.now(); taps=taps.filter(x=>t-x<2500); taps.push(t);
  if(taps.length>=2){ let s=0; for(let i=1;i<taps.length;i++) s+=taps[i]-taps[i-1]; setBpm(60000/(s/(taps.length-1))); }
};

function updateStart(){ $('start').disabled = state.blocks.length===0; }

/* ============ AUDIO ============ */
let ctx=null, noiseBuf=null;
function ensureCtx(){
  if(ctx) return;
  ctx = new (window.AudioContext||window.webkitAudioContext)();
  ctx.onstatechange=()=>{ if(playing && ctx.state!=='running') ctx.resume().catch(()=>{}); };
  const len = Math.floor(ctx.sampleRate*0.25);
  noiseBuf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
}
// strum: filtered noise burst. down = warmer/low, up = brighter/high
function strum(time, tok, accent){
  if(tok==='-') return;
  const src=ctx.createBufferSource(); src.buffer=noiseBuf;
  const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=0.8;
  const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=tok==='U'?6500:4200;
  const g=ctx.createGain();
  const f0 = tok==='U' ? 2600 : 1300;
  bp.frequency.setValueAtTime(f0, time);
  bp.frequency.exponentialRampToValueAtTime(tok==='U'? f0*0.6 : f0*1.5, time+0.10);
  const peak=(accent?0.85:0.6)*(tok==='U'?0.85:1);
  g.gain.setValueAtTime(0.0001,time);
  g.gain.exponentialRampToValueAtTime(peak,time+0.005);
  g.gain.exponentialRampToValueAtTime(0.0001,time+(tok==='U'?0.09:0.12));
  src.connect(bp); bp.connect(lp); lp.connect(g); g.connect(ctx.destination);
  src.start(time); src.stop(time+0.25);
}
function metClick(time, accent){
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.frequency.value=accent?2000:1400;
  o.connect(g); g.connect(ctx.destination);
  g.gain.setValueAtTime(0.0001,time);
  g.gain.exponentialRampToValueAtTime(accent?0.5:0.32,time+0.001);
  g.gain.exponentialRampToValueAtTime(0.0001,time+0.04);
  o.start(time); o.stop(time+0.05);
}

/* ============ SCHEDULER ============ */
let playing=false;
let seq=[];            // resolved blocks: {boi:[8], chord, reps}
let bi=0, rep=0, s=0;  // block / repeat / stroke(0..15)
let counting=0;        // remaining count-in sixteenth-notes
let nextTime=0, timerId=null, rafId=null;
let uiQueue=[];
const SCHEDULE_AHEAD=0.1, LOOKAHEAD=25;

function curBoi(){ return seq[bi].boi; }
function subdurOf(boi){ return (60/state.bpm)/SPB; }   // длительность одного удара (восьмая) — одинакова везде

function advance(){
  if(counting>0){ nextTime += 60/state.bpm; counting--; return; }  // отсчёт идёт долями
  nextTime += subdurOf(curBoi());                                  // длит. только что сыгранного удара
  s++;
  if(s>=curBoi().length){
    s=0; rep++;
    if(rep>=seq[bi].reps){
      rep=0;
      const next=bi+1;
      if(next>=seq.length){ if(state.loop) bi=0; else { stopRequested=true; } }
      else bi=next;
    }
  }
}
let stopRequested=false;

function scheduler(){
  if(ctx.state==='running'){
    if(nextTime < ctx.currentTime){ nextTime = ctx.currentTime+0.05; }
    while(nextTime < ctx.currentTime + SCHEDULE_AHEAD){
      if(stopRequested){ uiQueue.push({time:nextTime, kind:'end'}); break; }
      if(counting>0){
        const beat = 4 - counting;          // 0..3
        metClick(nextTime, beat===0);
        uiQueue.push({time:nextTime, kind:'count', n:beat+1});
      }else{
        const blk=seq[bi]; const boi=blk.boi; const tok=boi[s]; const accent=(s%8===0);  // акцент на долю 1 каждого такта
        strum(nextTime, tok, accent);
        if(state.met && s%SPB===0) metClick(nextTime, accent);
        uiQueue.push({time:nextTime, kind:'play', bi, s, tok, chord:blk.chord});
      }
      advance();
    }
    if(stopRequested) return; // let draw flush 'end'
  }else if(playing){ ctx.resume().catch(()=>{}); }
  timerId=setTimeout(scheduler,LOOKAHEAD);
}

/* ============ VISUALS ============ */
const pcellsEl=$('pcells'), beatsEl=$('beats'), arrowEl=$('arrow');
let lastBi=-1;
function buildPCells(boi){
  const pb=SPB;
  pcellsEl.className='pcells cells';   // 8 в ряд: 8-ударный = 1 ряд, 16-ударный = 2 ряда
  pcellsEl.innerHTML='';
  boi.forEach((tok,i)=>{
    const c=document.createElement('div');
    c.className='cell '+CLASS[tok]+(i%pb===0?' beatmark':'');
    c.textContent=ARROW[tok];
    pcellsEl.appendChild(c);
  });
}
function nextChordLabel(){
  // find next block's chord (after current repeats finish)
  if(seq.length<=1 && !state.loop) return '';
  const ni=(bi+1)%seq.length;
  return seq[ni]?seq[ni].chord:'';
}
function renderEvent(ev){
  if(ev.kind==='end'){ stopPlay(); return; }
  if(ev.kind==='count'){
    $('pchord').textContent = ev.n; $('pdiag').innerHTML='';
    $('pnext').innerHTML = 'приготовься…';
    arrowEl.className='arrowbig r'; arrowEl.textContent='·';
    [...beatsEl.children].forEach((b,i)=>b.classList.toggle('on', i===ev.n-1));
    return;
  }
  const blk=seq[ev.bi];
  if(ev.bi!==lastBi){
    lastBi=ev.bi;
    buildPCells(blk.boi);
    $('pchord').textContent = blk.chord || '—';
    $('pdiag').innerHTML = chordDiagram(blk.chord);
    const nx=nextChordLabel();
    $('pnext').innerHTML = nx ? `далее: <b>${nx}</b>` : '';
    $('pblock').textContent = `такт ${ev.bi+1}/${seq.length} · Бой ${blk.boi.__n||(state.bois.indexOf(blk.boi)+1)}`;
  }
  // highlight stroke
  const cells=[...pcellsEl.children];
  cells.forEach((c,i)=>c.classList.toggle('live', i===ev.s));
  // big arrow
  arrowEl.className='arrowbig '+CLASS[ev.tok]+' pulse';
  arrowEl.textContent=ARROW[ev.tok];
  requestAnimationFrame(()=>arrowEl.classList.remove('pulse'));
  // beat dots (доля = 2 удара; 16-ударный бой = 2 такта, точки идут по кругу 0..3)
  const q=Math.floor(ev.s/SPB)%4;
  [...beatsEl.children].forEach((b,i)=>b.classList.toggle('on', i===q));
  // flash on bar start (каждые 8 ударов)
  if(ev.s%8===0){
    const f=$('flash'); f.style.transition='none'; f.style.opacity='0.12';
    requestAnimationFrame(()=>{ f.style.transition='opacity .25s'; f.style.opacity='0'; });
  }
}
function draw(){
  while(uiQueue.length && uiQueue[0].time <= ctx.currentTime){ renderEvent(uiQueue.shift()); }
  rafId=requestAnimationFrame(draw);
}

/* ============ audition single бой ============ */
let audTimer=null;
function auditionBoi(idx, btn){
  ensureCtx();
  if(ctx.state!=='running') ctx.resume().catch(()=>{});
  if(audTimer){ clearTimeout(audTimer); audTimer=null; document.querySelectorAll('.miniBtn.play').forEach(b=>b.textContent='▶ Прослушать'); }
  const boi=state.bois[idx]; const L=boi.length, pb=SPB;
  btn.textContent='■ Стоп';
  let t=ctx.currentTime+0.08, i=0;
  const step=()=>{
    const tok=boi[i%L];
    strum(t, tok, i%8===0);
    if(state.met && i%pb===0) metClick(t, i%8===0);
    t+=subdurOf(boi); i++;
    if(i>=L*2){ btn.textContent='▶ Прослушать'; audTimer=null; return; } // 2 такта
    audTimer=setTimeout(step, (t-ctx.currentTime-0.1)*1000);
  };
  step();
}

/* ============ wake lock / iOS revive ============ */
let wakeLock=null;
async function keepAwake(on){
  try{
    if(on && 'wakeLock' in navigator){ wakeLock=await navigator.wakeLock.request('screen'); }
    else if(wakeLock){ await wakeLock.release(); wakeLock=null; }
  }catch(e){}
}
function resumeAudio(){ if(ctx && ctx.state!=='running') ctx.resume().catch(()=>{}); }
document.addEventListener('visibilitychange',()=>{ if(playing && document.visibilityState==='visible'){ keepAwake(true); resumeAudio(); } });
document.addEventListener('pointerdown',()=>{ if(playing) resumeAudio(); }, {passive:true});

/* ============ start / stop ============ */
async function startPlay(){
  if(state.blocks.length===0) return;
  ensureCtx();
  if(ctx.state!=='running') await ctx.resume().catch(()=>{});

  // resolve sequence (reference live бой arrays so visuals tag the бой number)
  seq = state.blocks.map(b=>{ const arr=state.bois[b.boi]; arr.__n=b.boi+1; return {boi:arr, chord:b.chord, reps:b.reps}; });
  bi=0; rep=0; s=0; lastBi=-1; uiQueue=[]; stopRequested=false;
  counting = state.count ? 4 : 0;   // один такт отсчёта (4 доли)

  beatsEl.innerHTML=''; for(let i=0;i<4;i++) beatsEl.appendChild(document.createElement('i'));
  buildPCells(seq[0].boi);
  $('pchord').textContent = state.count ? '1' : (seq[0].chord||'—');
  $('pdiag').innerHTML = state.count ? '' : chordDiagram(seq[0].chord);
  $('pnext').innerHTML=''; $('pblock').textContent='';
  arrowEl.className='arrowbig r'; arrowEl.textContent='·';

  playing=true;
  $('setup').classList.add('hidden'); $('play').classList.remove('hidden');
  const sb=$('start'); sb.textContent='■ Стоп'; sb.classList.add('stop');
  keepAwake(true);

  nextTime=ctx.currentTime+0.12;
  scheduler(); draw();
}
function stopPlay(){
  playing=false;
  clearTimeout(timerId); cancelAnimationFrame(rafId);
  $('play').classList.add('hidden'); $('setup').classList.remove('hidden');
  const sb=$('start'); sb.textContent='▶ Старт'; sb.classList.remove('stop');
  keepAwake(false);
}
$('start').onclick=()=>{ playing?stopPlay():startPlay(); };

/* ============ init ============ */
renderBois(); renderChips(); renderBlocks();
syncOptBtn('optMet',state.met,'Метроном');
syncOptBtn('optCount',state.count,'Отсчёт');
syncOptBtn('optLoop',state.loop,'Зациклить');
setBpm(state.bpm); updateStart();
</script>
</body>
